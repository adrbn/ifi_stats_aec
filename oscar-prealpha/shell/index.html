<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>OSCAR — v2 / v3</title>
<style>
  /* ── Design tokens (alignés sur la v3 : IBM Plex, slate, IFI-blue, radius 6px) ── */
  :root {
    --bg: #f8fafc;          /* slate-50  */
    --bar: #ffffff;
    --border: #e2e8f0;      /* slate-200 */
    --ink: #0f172a;         /* slate-900 */
    --muted: #64748b;       /* slate-500 */
    --track: #f1f5f9;       /* slate-100 */
    --accent: #3b82f6;      /* IFI blue  */
    --thumb-shadow: 0 1px 2px rgba(15, 23, 42, .12), 0 1px 1px rgba(15, 23, 42, .06);
    --bar-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Top bar ── */
  .bar {
    height: var(--bar-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
    background: var(--bar);
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .name { font-weight: 700; letter-spacing: .14em; font-size: 15px; }
  .brand .sub  { font-size: 12.5px; color: var(--muted); }

  /* ── Apple-style segmented control ── */
  .seg {
    position: relative;
    display: inline-flex;
    background: var(--track);
    border-radius: 9px;
    padding: 3px;
    user-select: none;
  }
  .seg__thumb {
    position: absolute; top: 3px; left: 3px;
    width: calc(50% - 3px); height: calc(100% - 6px);
    background: #fff; border-radius: 7px;
    box-shadow: var(--thumb-shadow);
    transition: transform .26s cubic-bezier(.32, .72, 0, 1);
  }
  .seg[data-active="v3"] .seg__thumb { transform: translateX(100%); }
  .seg__btn {
    position: relative; z-index: 1;
    appearance: none; border: 0; background: transparent; cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 600;
    color: var(--muted);
    padding: 7px 16px; border-radius: 7px;
    transition: color .2s ease;
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
  }
  .seg__btn .dot { width: 7px; height: 7px; border-radius: 50%; opacity: .85; }
  .seg__btn[data-k="v2"] .dot { background: #ff8c00; }
  .seg__btn[data-k="v3"] .dot { background: var(--accent); }
  .seg[data-active="v2"] .seg__btn[data-k="v2"] { color: var(--ink); }
  .seg[data-active="v3"] .seg__btn[data-k="v3"] { color: var(--ink); }

  .hint { font-size: 12px; color: var(--muted); min-width: 0; }
  .hint a { color: var(--accent); text-decoration: none; }

  /* ── Stage : deux iframes persistantes empilées ── */
  .stage { position: relative; height: calc(100% - var(--bar-h)); }
  .pane {
    position: absolute; inset: 0;
    border: 0; width: 100%; height: 100%;
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: opacity .18s ease;
    background: var(--bg);
  }
  .pane.active { opacity: 1; visibility: visible; pointer-events: auto; }

  /* Voile d'aide v3 (backend local requis) */
  .veil {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; padding: 24px;
    background: var(--bg);
  }
  .veil.show { display: flex; }
  .card {
    max-width: 460px; text-align: center;
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 30px; box-shadow: 0 8px 30px rgba(15,23,42,.06);
  }
  .card h2 { font-size: 16px; margin-bottom: 8px; }
  .card p  { font-size: 13.5px; color: var(--muted); line-height: 1.55; }
  .card code { background: var(--track); padding: 2px 6px; border-radius: 5px; font-size: 12.5px; }
</style>
</head>
<body>
  <div class="bar">
    <div class="brand">
      <span class="name">OSCAR</span>
      <span class="sub">comparateur v2 / v3</span>
    </div>

    <div class="seg" id="seg" data-active="v2" role="tablist" aria-label="Choisir la version">
      <span class="seg__thumb" aria-hidden="true"></span>
      <button class="seg__btn" data-k="v2" role="tab" aria-selected="true">
        <span class="dot"></span>v2 · Streamlit
      </button>
      <button class="seg__btn" data-k="v3" role="tab" aria-selected="false">
        <span class="dot"></span>v3 · Nouvelle UI
      </button>
    </div>

    <div class="hint" id="hint">en ligne · production</div>
  </div>

  <div class="stage">
    <!-- v2 : app de production, en live. ?embed=true masque le chrome Streamlit. -->
    <iframe id="pane-v2" class="pane active" title="OSCAR v2 (Streamlit)" referrerpolicy="no-referrer"></iframe>
    <!-- v3 : nouvelle UI, servie en local par le backend FastAPI + Next. -->
    <iframe id="pane-v3" class="pane" title="OSCAR v3 (Next.js)" referrerpolicy="no-referrer"></iframe>
    <div class="veil" id="veil-v3">
      <div class="card">
        <h2>v3 en local</h2>
        <p>La nouvelle UI tourne sur ta machine. Si ce volet reste vide, lance la stack&nbsp;:
        <br><br><code>./start-compare.sh</code><br><br>
        (démarre le backend FastAPI <code>:8000</code> + le front Next.js <code>:3000</code>.)</p>
      </div>
    </div>
  </div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  // v2 = app de prod (live). v3 = front local. Surchargeable via l'URL :
  //   ...index.html?v2=https://...&v3=http://localhost:3007
  const params = new URLSearchParams(location.search);
  const V2_URL = params.get("v2") || "https://ifi-stats-aec.streamlit.app/?embed=true";
  const V3_URL = params.get("v3") || "http://localhost:3000/cours/synthese";

  const HINTS = {
    v2: 'en ligne · production',
    v3: 'local · <a href="' + V3_URL + '" target="_blank" rel="noreferrer">localhost</a>'
  };

  const seg   = document.getElementById("seg");
  const hint  = document.getElementById("hint");
  const v2    = document.getElementById("pane-v2");
  const v3    = document.getElementById("pane-v3");
  const veil  = document.getElementById("veil-v3");

  // Les deux iframes sont chargées dès le départ et ne sont jamais déchargées
  // → chaque version conserve son état (filtres, scroll, session) au switch.
  v2.src = V2_URL;
  v3.src = V3_URL;

  let activeVersion = "v2";
  let v3Down = false;

  // Le voile d'aide n'apparaît QUE si l'onglet v3 est actif et la v3 injoignable.
  function updateVeil() {
    veil.classList.toggle("show", activeVersion === "v3" && v3Down);
  }

  function show(version) {
    activeVersion = version;
    seg.dataset.active = version;
    v2.classList.toggle("active", version === "v2");
    v3.classList.toggle("active", version === "v3");
    hint.innerHTML = HINTS[version];
    seg.querySelectorAll(".seg__btn").forEach(b =>
      b.setAttribute("aria-selected", String(b.dataset.k === version)));
    updateVeil();
    try { localStorage.setItem("oscar.compare.version", version); } catch (_) {}
  }

  seg.querySelectorAll(".seg__btn").forEach(btn =>
    btn.addEventListener("click", () => show(btn.dataset.k)));

  // Raccourci clavier : ⌘/Ctrl + flèches, ou touches 1 / 2
  addEventListener("keydown", e => {
    if (e.key === "1") show("v2");
    else if (e.key === "2") show("v3");
    else if ((e.metaKey || e.ctrlKey) && (e.key === "ArrowLeft" || e.key === "ArrowRight"))
      show(e.key === "ArrowLeft" ? "v2" : "v3");
  });

  // Sonde la v3 locale (cross-origin → on teste juste l'accessibilité réseau).
  fetch(V3_URL, { mode: "no-cors" }).catch(() => { v3Down = true; updateVeil(); });
  v3.addEventListener("load", () => { v3Down = false; updateVeil(); });

  // Restaurer le dernier onglet choisi.
  try {
    const last = localStorage.getItem("oscar.compare.version");
    if (last === "v3") show("v3");
  } catch (_) {}
</script>
</body>
</html>
