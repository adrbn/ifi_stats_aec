name: Build OSCAR

# Triggers:
#   - Any push to main → build all platforms (for testing)
#   - Git tag v*.*.* → build + create GitHub Release with downloadable assets
on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pywebview cryptography pillow
          pip install streamlit pandas openpyxl plotly numpy
          brew install create-dmg

      - name: Build .app and .dmg
        run: bash build/build_mac.sh
        env:
          # Optional: set these secrets in GitHub repo settings for notarization
          CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSCAR-macOS
          path: dist/OSCAR-*.dmg
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pywebview cryptography pillow
          pip install streamlit pandas openpyxl plotly numpy

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes
        shell: powershell

      - name: Build .exe installer
        run: build\build_windows.bat
        env:
          CODESIGN_CERT: ${{ secrets.WIN_CODESIGN_CERT }}
          CODESIGN_PASS: ${{ secrets.WIN_CODESIGN_PASS }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSCAR-Windows
          path: dist/OSCAR-*-Windows-Setup.exe
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libgirepository1.0-dev \
            gir1.2-webkit2-4.0 \
            fuse \
            libfuse2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pywebview cryptography pillow
          pip install streamlit pandas openpyxl plotly numpy

      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Build AppImage
        run: bash build/build_linux.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSCAR-Linux
          path: dist/OSCAR-*-Linux-*.AppImage
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Only run on version tags (v1.0.0, v3.0.0, etc.)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OSCAR v${{ steps.version.outputs.VERSION }}"
          body: |
            ## OSCAR v${{ steps.version.outputs.VERSION }}
            **Outil de Suivi des Cours et d'Analyse du Réseau**

            ### Installation

            | Plateforme | Fichier | Notes |
            |---|---|---|
            | macOS 12+ | `OSCAR-*.dmg` | Double-cliquez pour installer dans Applications |
            | Windows 10/11 | `OSCAR-*-Windows-Setup.exe` | Exécutez l'installateur |
            | Linux (x86_64) | `OSCAR-*-Linux-x86_64.AppImage` | Rendez-le exécutable avec `chmod +x` |

            ### Licence
            Un fichier `oscar_license.lic` est requis. Contactez votre administrateur.

            ### Emplacement du fichier de licence
            - **macOS**: `~/Library/Application Support/OSCAR/oscar_license.lic`
            - **Windows**: `%APPDATA%\OSCAR\oscar_license.lic`
            - **Linux**: `~/.config/oscar/oscar_license.lic`
          files: |
            release-assets/OSCAR-macOS/*.dmg
            release-assets/OSCAR-Windows/*.exe
            release-assets/OSCAR-Linux/*.AppImage
          draft: false
          prerelease: false
