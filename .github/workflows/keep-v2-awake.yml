name: Keep v2 (Streamlit) awake

# Ping périodique de l'app Streamlit (v2) pour limiter sa mise en veille
# automatique (offre gratuite Streamlit Community Cloud). Un GET régulier
# réinitialise le minuteur d'inactivité tant que l'app n'est pas déjà endormie.
on:
  schedule:
    - cron: "*/5 * * * *" # toutes les ~5 min (best-effort, GitHub peut décaler)
  workflow_dispatch: {} # déclenchement manuel possible

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 60 \
            https://ifi-stats-aec.streamlit.app/ || echo "000")
          echo "Ping ifi-stats-aec.streamlit.app -> HTTP $code"
